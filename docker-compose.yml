services:
  villa-management:
    image: ghcr.io/rakibulrocky14/vma:latest
    container_name: villa-management
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
    environment:
      DATABASE_URL: "file:/app/data/villa.db"
      AUTH_SECRET: "${AUTH_SECRET:-}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      NODE_ENV: "production"
